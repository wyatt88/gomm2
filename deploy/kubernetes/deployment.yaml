apiVersion: apps/v1
kind: Deployment
metadata:
  name: gomm2
  namespace: kafka
  labels:
    app: gomm2
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gomm2
  template:
    metadata:
      labels:
        app: gomm2
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      # Spread pods across nodes to avoid co-locating with other memory-heavy workloads
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: gomm2
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: gomm2
                topologyKey: kubernetes.io/hostname
      containers:
        - name: gomm2
          image: gomm2:latest
          args:
            - "--config"
            - "/etc/gomm2/config.yaml"
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: GOMAXPROCS
              value: "4"
            - name: GOMEMLIMIT
              value: "6GiB"
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: config
              mountPath: /etc/gomm2
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: gomm2-config
---
apiVersion: v1
kind: Service
metadata:
  name: gomm2-metrics
  namespace: kafka
  labels:
    app: gomm2
spec:
  selector:
    app: gomm2
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
